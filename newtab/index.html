<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>New Tab</title>
  <link rel="stylesheet" href="../global.css" />
  <style>
    /* Newtab-specific tokens (extends global.css) */
    :root {
      --nt-bg-grad: radial-gradient(circle at 20% 0%, #1a1a24 0%, #0a0a0d 60%);
      --nt-clock-size: 132px;
      --nt-stat-size: 38px;
      --nt-stat-radius: 16px;
      --nt-btn-radius: 12px;
    }
    html, body { height: 100%; }
    body.ff-newtab-active {
      background: var(--nt-bg-grad);
      color: var(--tx);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 32px;
      font-variant-numeric: tabular-nums;
    }
    .clock {
      font-size: var(--nt-clock-size);
      font-weight: 200;
      letter-spacing: -6px;
      line-height: 1;
      color: var(--tx);
    }
    .date {
      font-size: 16px;
      color: var(--tx2);
      margin-top: 14px;
      font-weight: 500;
    }
    .greet {
      font-size: 22px;
      color: var(--tx);
      margin-top: 32px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(180px, 220px));
      gap: 20px;
      margin-top: 48px;
    }
    .stat {
      background: var(--bg2);
      border: 1px solid var(--bd);
      border-radius: var(--nt-stat-radius);
      padding: 22px 28px;
      text-align: center;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .stat-lbl {
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-weight: 700;
      color: var(--tx3);
    }
    .stat-val {
      font-size: var(--nt-stat-size);
      font-weight: 800;
      margin-top: 10px;
      letter-spacing: -0.04em;
      font-family: ui-monospace, "SF Mono", monospace;
    }
    .stat-val.green { color: var(--green); }
    .stat-val.red   { color: var(--red); }
    .stat-val.white { color: var(--tx); }

    .actions { display: flex; gap: 14px; margin-top: 40px; }

    .quote { margin-top: 42px; color: var(--tx3); font-style: italic; font-size: 14px; }

    .live-timer {
      margin-top: 24px;
      font-size: 18px;
      color: var(--green);
      font-weight: 700;
      font-family: ui-monospace, "SF Mono", monospace;
      letter-spacing: 0.04em;
      display: none;
    }
    .live-timer.brk { color: var(--amber); }
    .live-timer.show { display: block; }
  </style>
</head>
<body>
  <div class="clock" id="clock">00:00</div>
  <div class="date"  id="date"></div>
  <div class="greet" id="greet">Welcome back</div>

  <div class="stats">
    <div class="stat">
      <div class="stat-lbl">Productivity Today</div>
      <div class="stat-val green" id="stat-prod">0m</div>
    </div>
    <div class="stat">
      <div class="stat-lbl">Distraction Today</div>
      <div class="stat-val red" id="stat-dist">0m</div>
    </div>
    <div class="stat">
      <div class="stat-lbl">Focus Cycles</div>
      <div class="stat-val white" id="stat-cycles">0</div>
    </div>
  </div>

  <div class="live-timer" id="live-timer">⏱ 25:00 remaining</div>

  <div class="actions">
    <button class="bp" id="btn-focus">Start Focus</button>
    <button class="bs"    id="btn-dash">Open Dashboard</button>
  </div>

  <div class="quote" id="quote">"Future you is watching. Make them proud."</div>

  <script src="../src/lib/constants.js"></script>
  <script src="../src/lib/storage.js"></script>
  <script src="../utils.js"></script>
  <script src="newtab.js"></script>
</body>
</html>
